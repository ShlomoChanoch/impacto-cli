# Generated by Impacto CLI
# Provider: OCI (Oracle Cloud Infrastructure)
# Resource: Subnet
# API: networking.oci.upbound.io/v1alpha1
# Docs: https://docs.oracle.com/en-us/iaas/Content/Network/
#
# PREREQUISITES:
# - VCN must exist before creating Subnet
# - provider-oci-networking must be installed on your Crossplane cluster
#
# INSTRUCTIONS:
# 1. Apply: kubectl apply -f this-file.yaml
#
apiVersion: networking.oci.upbound.io/v1alpha1
kind: Subnet
metadata:
  name: my-subnet  # CHANGE: your subnet name
  annotations:
    crossplane.io/external-name: my-subnet
spec:
  forProvider:
    # REQUIRED: Compartment OCID
    compartmentId: ocid1.compartment.oc1..aaaaaaaaxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx  # CHANGE: your compartment OCID

    # REQUIRED: VCN OCID where subnet will be created
    vcnId: ocid1.vcn.oc1..aaaaaaaaxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx  # CHANGE: your VCN OCID

    # REQUIRED: CIDR block for the subnet
    cidrBlock: "10.0.1.0/24"  # CHANGE: subnet CIDR (must be within VCN CIDR)

    # OPTIONAL: Availability domain
    # Leave empty for regional subnet (default)
    availabilityDomain: ""  # CHANGE: AD name for AD-specific subnet, or leave empty

    # OPTIONAL: DNS label
    dnsLabel: mysubnet  # CHANGE: your DNS label (max 15 chars, alphanumeric)

    # OPTIONAL: Display name
    displayName: my-subnet

    # OPTIONAL: Prohibit public IP on VNICs in this subnet
    prohibitPublicIpOnVnic: false  # default: false, set to true for private subnet

    # Internet Gateway access
    # Route table should be configured separately
    # use kubectl get vcn.networking.oci.upbound.io <your-vcn-name> -o jsonpath='{.status.atProvider.defaultRouteTableId}'
    routeTableId: ocid1.routetable.oc1..aaaaaaaaaaaxxxxxxxxxxxxxxxxxxxxxxxxxxxxx  # CHANGE: your route table OCID

    # OPTIONAL: Security lists
    # securityListIds:
    #   - ocid1.securitylist.oc1..xxxxx

    # OPTIONAL: Freeform tags
    freeformTags:
      environment: development  # CHANGE: your environment
      project: my-project       # CHANGE: your project name
      managed-by: crossplane

  providerConfigRef:
    name: default  # CHANGE: your OCI ProviderConfig name (kubectl get providerconfig)

  deletionPolicy: Delete # lets you delete the subnet with kubectl delete, otherwise it will be orphaned in OCI and require manual deletion