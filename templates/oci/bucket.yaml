apiVersion: objectstorage.oci.upbound.io/v1alpha1
kind: Bucket
metadata:
  name: my-bucket  # CHANGE: unique bucket name
  annotations:
    crossplane.io/external-name: my-bucket  # CHANGE: match OCI bucket name
spec:
  forProvider:
    # REQUIRED: Compartment OCID
    compartmentId: ocid1.compartment.oc1..aaaaaaaaxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx  # CHANGE: your compartment OCID

    # REQUIRED: OCI Object storage namespace
    namespace: mynamespace  # CHANGE: your OCI Object storage namespace (see OCI console > Tenancy Details)

    # OPTIONAL: Bucket name (if different from metadata.name)
    name: my-bucket

    # OPTIONAL: Storage tier
    # Values: Standard, Archive
    storageTier: Standard  # default: Standard

    # OPTIONAL: Freeform tags
    freeformTags:
      environment: development  # CHANGE: your environment
      project: my-project       # CHANGE: your project name
      managed-by: crossplane

    # OPTIONAL: Defined tags
    # definedTags:
    #   MyNamespace:
    #     MyKey: MyValue

  providerConfigRef:
    name: default  # CHANGE: your OCI ProviderConfig name (kubectl get providerconfig)

  deletionPolicy: Delete # Allows you to delete the bucket through Crossplane (default: Delete)